<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maré - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #F8F6F2;
      color: #1E2D38;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 340px;
    }
    .wave {
      font-size: 4rem;
      display: block;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 1.625rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #1E2D38;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #4A5B65;
    }
    .brand {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #7FA9A4;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="wave">🌊</span>
    <h1>Maré baixa</h1>
    <p>Parece que você está offline.<br>Seus registros continuam salvos no dispositivo e estarão aqui quando a conexão voltar.</p>
    <p class="brand">Maré — A vida em ciclos</p>
  </div>
</body>
</html>
